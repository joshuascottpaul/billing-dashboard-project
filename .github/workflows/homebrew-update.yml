name: Update Homebrew Tap on Release

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger tap update
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.HOMEBREW_TAP_TOKEN }}" \
            https://api.github.com/repos/joshuascottpaul/homebrew-tap/dispatches \
            -d '{"event_type":"release-published","client_payload":{"release":{"tag_name":"${{ github.event.release.tag_name }}"}}}'
          
          echo "Triggered homebrew-tap update for ${{ github.event.release.tag_name }}"
